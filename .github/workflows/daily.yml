name: Daily Spanish Word Video

on:
  schedule:
    - cron: "0 13 * * *"   # slot 0 — 1 PM UTC  (Mexico morning commute, US East 8 AM)
    - cron: "0 18 * * *"   # slot 1 — 6 PM UTC  (Mexico lunch, US East 1 PM)
    - cron: "0 23 * * *"   # slot 2 — 11 PM UTC (Mexico early evening, US East 6 PM)
    - cron: "0 2 * * *"    # slot 3 — 2 AM UTC  (US East 9 PM prime)
  workflow_dispatch:        # manual trigger (skips random sleep)

jobs:
  publish:
    runs-on: ubuntu-latest
    # Needed so the bot can commit uploads.md back to the repo
    permissions:
      contents: write

    steps:
      - name: Random delay (0–59 min) — skipped on manual runs
        if: github.event_name == 'schedule'
        run: sleep $((RANDOM % 3600))

      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
        run: python pipeline.py

      - name: Commit upload history + playlist cache
        # Run even if the pipeline failed — both files only change when
        # an upload actually succeeded, so committing is always safe.
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          changed=0
          for f in uploads.md playlists.json; do
            if [ -f "$f" ] && ! git diff --quiet "$f"; then
              git add "$f"
              changed=1
            fi
          done
          if [ "$changed" = "1" ]; then
            git commit -m "Log upload: $(date -u +%Y-%m-%d) slot ${{ github.run_id }}"
            git push
          else
            echo "Nothing to commit"
          fi
